<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lavender Night Pagoda</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1A1028;
      font-family: system-ui, sans-serif;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* Oversized layers so parallax never exposes edges */
    .layer img {
      width: 180vw;
      height: 180vh;
      object-fit: cover;
      pointer-events: none;
    }

    /* Base layer container */
    .layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      will-change: transform;
    }

    /* Z-index stacking */
    .sky { z-index: 1; }
    .clouds-back { z-index: 2; }
    .clouds-front { z-index: 3; }
    .mountains { z-index: 4; }
    .ocean { z-index: 5; }
    .waves-near { z-index: 6; }
    .waves-front { z-index: 7; }
    .pagoda { z-index: 8; }
    .lavender-overlay { z-index: 9; }

    /* Vertical positioning using translate3d so parallax doesn't override */
    .sky { transform: translate3d(0, -10%, 0); }
    .clouds-back { transform: translate3d(0, -25%, 0); }
    .clouds-front { transform: translate3d(0, -18%, 0); }
    .mountains { transform: translate3d(0, -5%, 0); }
    .ocean { transform: translate3d(0, 10%, 0); }
    .waves-near { transform: translate3d(0, 20%, 0); }
    .waves-front { transform: translate3d(0, 28%, 0); }

    /* Independent ocean drift */
    @keyframes oceanDrift {
      0% { transform: translate3d(0, 10%, 0); }
      50% { transform: translate3d(15px, 10%, 0); }
      100% { transform: translate3d(0, 10%, 0); }
    }

    .ocean {
      animation: oceanDrift 20s ease-in-out infinite;
    }

    /* Independent near-wave drift */
    @keyframes waveNearDrift {
      0% { transform: translate3d(0, 20%, 0); }
      50% { transform: translate3d(8px, 20%, 0); }
      100% { transform: translate3d(0, 20%, 0); }
    }

    .waves-near {
      animation: waveNearDrift 14s ease-in-out infinite;
    }

    /* Foreground waves motion */
    @keyframes waveMotion {
      0% { transform: translate3d(0, 28%, 0); }
      50% { transform: translate3d(12px, 28%, 0); }
      100% { transform: translate3d(0, 28%, 0); }
    }

    .waves-front {
      animation: waveMotion 8s ease-in-out infinite;
    }

    /* Lavender glow overlay */
    .lavender-overlay {
      background: radial-gradient(circle at 50% 20%, rgba(123, 91, 190, 0.35), transparent 65%);
    }
  </style>
</head>
<body>
  <div id="scene">

    <div class="layer sky" data-depth="0.05">
      <img src="assets/sky.png" alt="Lavender night sky" />
    </div>

    <div class="layer clouds-back" data-depth="0.10">
      <img src="assets/clouds_back.png" alt="Distant clouds" />
    </div>

    <div class="layer clouds-front" data-depth="0.15">
      <img src="assets/clouds_front.png" alt="Closer clouds" />
    </div>

    <div class="layer mountains" data-depth="0.18">
      <img src="assets/mountains.png" alt="Distant mountains" />
    </div>

    <!-- OCEAN NO LONGER MOVES WITH CURSOR -->
    <div class="layer ocean" data-depth="0">
      <img src="assets/ocean.png" alt="Ocean horizon" />
    </div>

    <!-- BACK WAVES ALSO STATIC RELATIVE TO CURSOR -->
    <div class="layer waves-near" data-depth="0">
      <img src="assets/waves_near.png" alt="Near waves" />
    </div>

    <!-- FRONT WAVES STILL PARALLAX + ANIMATED -->
    <div class="layer waves-front" data-depth="0.40">
      <img src="assets/waves_front.png" alt="Foreground waves" />
    </div>

    <div class="layer pagoda" data-depth="0.45">
      <img src="assets/pagoda_platform.png" alt="Pagoda on stone platform" />
    </div>

    <div class="layer lavender-overlay" data-depth="0.02"></div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
  <script>
    const scene = document.getElementById('scene');
    const parallaxInstance = new Parallax(scene, {
      relativeInput: true,
      hoverOnly: false,
      scalarX: 18,
      scalarY: 12,
      frictionX: 0.08,
      frictionY: 0.08
    });
  </script>
</body>
</html>
