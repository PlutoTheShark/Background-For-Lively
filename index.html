<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lavender Night Pagoda</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #1A1028;
      font-family: system-ui, sans-serif;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .layer {
      position: absolute;
      inset: 0;
      will-change: transform;
    }

    .content {
      position: absolute;
      inset: 0;
    }

    /* Slightly zoomed out for better framing */
    .content img {
      width: 115vw;
      height: 115vh;
      object-fit: cover;
      pointer-events: none;
    }

    /* Z stacking */
    .sky       { z-index: 1; }
    .clouds-b  { z-index: 2; }
    .clouds-f  { z-index: 3; }
    .mountains { z-index: 4; }
    .ocean     { z-index: 5; }
    .waves-n   { z-index: 6; }
    .waves-f   { z-index: 7; }
    .pagoda    { z-index: 8; }
    .overlay   { z-index: 9; }

    /* Base positions */
    .sky-content       { transform: scale(1.05) translate3d(0, -5%, 0); }
    .clouds-b-content  { transform: translate3d(0, -35%, 0); }
    .clouds-f-content  { transform: translate3d(0, -30%, 0); }
    .mountains-content { transform: translate3d(0, 0, 0); }
    .pagoda-content    { transform: translate3d(0, 5%, 0); }
    .ocean-content     { transform: translate3d(-5%, 10%, 0); }
    .waves-n-content   { transform: translate3d(-5%, 20%, 0); }
    .waves-f-content   { transform: translate3d(-5%, 35%, 0); }

    /* Expand clouds and ocean horizontally */
    .clouds-b-content img,
    .clouds-f-content img,
    .ocean-content img {
      width: 140vw;
    }

    /* Stretch waves horizontally + transparency */
    .waves-n-content img,
    .waves-f-content img {
      width: 150vw;
      opacity: 0.8; /* semi-transparent waves */
    }

    /* Scale down waves slightly for realism */
    .waves-n-content img { transform: scale(0.85); }
    .waves-f-content img { transform: scale(0.80); }

    /* Cloud drift */
    @keyframes cloudsBackDrift {
      0%   { transform: translate3d(-10px, -35%, 0); }
      50%  { transform: translate3d( 10px, -35%, 0); }
      100% { transform: translate3d(-10px, -35%, 0); }
    }
    @keyframes cloudsFrontDrift {
      0%   { transform: translate3d(-6px, -30%, 0); }
      50%  { transform: translate3d( 6px, -30%, 0); }
      100% { transform: translate3d(-6px, -30%, 0); }
    }
    .clouds-b-content { animation: cloudsBackDrift 40s ease-in-out infinite; }
    .clouds-f-content { animation: cloudsFrontDrift 32s ease-in-out infinite; }

    /* Ocean drift */
    @keyframes oceanDrift {
      0%   { transform: translate3d(-12px, 10%, 0); }
      50%  { transform: translate3d( 12px, 10%, 0); }
      100% { transform: translate3d(-12px, 10%, 0); }
    }
    .ocean-content { animation: oceanDrift 26s ease-in-out infinite; }

    /* Mid waves drift */
    @keyframes wavesNearDrift {
      0%   { transform: translate3d(-8px, 20%, 0); }
      50%  { transform: translate3d( 8px, 20%, 0); }
      100% { transform: translate3d(-8px, 20%, 0); }
    }
    .waves-n-content { animation: wavesNearDrift 18s ease-in-out infinite; }

    /* Foreground waves drift */
    @keyframes wavesFrontDrift {
      0%   { transform: translate3d(-10px, 35%, 0); }
      50%  { transform: translate3d( 10px, 35%, 0); }
      100% { transform: translate3d(-10px, 35%, 0); }
    }
    .waves-f-content { animation: wavesFrontDrift 12s ease-in-out infinite; }

    /* Lavender overlay */
    .overlay-content {
      background: radial-gradient(circle at 50% 20%, rgba(123, 91, 190, 0.35), transparent 65%);
    }
  </style>
</head>
<body>
  <div id="scene">
    <div class="layer sky" data-depth="0.02">
      <div class="content sky-content">
        <img src="assets/sky.png" alt="Lavender night sky">
      </div>
    </div>

    <div class="layer clouds-b" data-depth="0.06">
      <div class="content clouds-b-content">
        <img src="assets/clouds_back.png" alt="Distant clouds">
      </div>
    </div>

    <div class="layer clouds-f" data-depth="0.10">
      <div class="content clouds-f-content">
        <img src="assets/clouds_front.png" alt="Closer clouds">
      </div>
    </div>

    <div class="layer mountains" data-depth="0.02">
      <div class="content mountains-content">
        <img src="assets/mountains.png" alt="Distant mountains">
      </div>
    </div>

    <div class="layer ocean" data-depth="0">
      <div class="content ocean-content">
        <img src="assets/ocean.png" alt="Ocean horizon">
      </div>
    </div>

    <div class="layer waves-n" data-depth="0.10">
      <div class="content waves-n-content">
        <img src="assets/waves_near.png" alt="Near waves">
      </div>
    </div>

    <div class="layer waves-f" data-depth="0.20">
      <div class="content waves-f-content">
        <img src="assets/waves_front.png" alt="Foreground waves">
      </div>
    </div>

    <div class="layer pagoda" data-depth="0.02">
      <div class="content pagoda-content">
        <img src="assets/pagoda_platform.png" alt="Pagoda on stone platform">
      </div>
    </div>

    <div class="layer overlay" data-depth="0.01">
      <div class="content overlay-content"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/parallax/3.1.0/parallax.min.js"></script>
  <script>
    const scene = document.getElementById('scene');
    new Parallax(scene, {
      relativeInput: true,
      hoverOnly: false,
      scalarX: 18,
      scalarY: 12,
      frictionX: 0.08,
      frictionY: 0.08,
      center: { x: 0.60, y: 0.5 } // viewer shifted further right
    });
  </script>
</body>
</html>
